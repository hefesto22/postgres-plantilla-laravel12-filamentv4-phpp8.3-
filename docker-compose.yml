# ─────────────────────────────────────────────────────────────────
# docker-compose.yml — Plantilla Grupo Olympo
#
# Este archivo es OPCIONAL. Cuándo usarlo:
#
#  1. Desarrollo local SIN Postgres/Redis ya instalados (Herd no
#     incluye estos servicios) → ejecutar: docker compose up -d
#
#  2. Si compartes VPS con otros proyectos que ya tienen Postgres y
#     Redis corriendo en Docker, NO uses este archivo. En su lugar
#     conecta el .env al contenedor existente y crea una DB nueva
#     dentro de él (ver §19.4 del documento de instrucciones).
#
# Todos los nombres se derivan de variables del .env — ningún valor
# hardcoded del proyecto. Cambia COMPOSE_PROJECT_NAME y APP_SLUG
# en .env y todo se renombra automáticamente.
# ─────────────────────────────────────────────────────────────────

services:

  postgres:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-plantilla_olympo}_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-plantilla_olympo}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${COMPOSE_POSTGRES_PASSWORD:-}
      POSTGRES_HOST_AUTH_METHOD: ${COMPOSE_POSTGRES_PASSWORD:+md5}
      # Si COMPOSE_POSTGRES_PASSWORD está vacío, Postgres acepta
      # conexiones sin password (solo desarrollo local).
    ports:
      - "${COMPOSE_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-plantilla_olympo}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-plantilla_olympo}_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "${COMPOSE_REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: ${COMPOSE_PROJECT_NAME:-plantilla_olympo}_postgres_data
  redis_data:
    name: ${COMPOSE_PROJECT_NAME:-plantilla_olympo}_redis_data
